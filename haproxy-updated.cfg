# xi.spawndev.com:44365
# visual studio hosted Blazor WASM client SpawnDev (http on port 5192)
# netsh interface portproxy show all
# netsh interface portproxy add v4tov4 listenaddress=0.0.0.0 listenport=2888 connectaddress=127.0.0.1 connectport=5192
# netsh interface portproxy delete v4tov4 listenaddress=0.0.0.0 listenport=2888
backend njs_xi_spawndev
    option http-server-close
    option httpclose
    no option httpclose
    option forwardfor except 127.0.0.1
    http-request add-header x-forwarded-proto https
    server xi0 192.168.1.120:2888 weight 1 maxconn 8192 check
    # http-response set-header Content-Security-Policy "default-src 'self' 'unsafe-eval' 'unsafe-inline' ws: data: blob: spawndev.com:* *.spawndev.com:*; connect-src blob: *; worker-src 'self' blob: spawndev.com:* *.spawndev.com:*;"
    # "require-corp" or "credentialless"
    http-response set-header Cross-Origin-Embedder-Policy "credentialless"
    http-response set-header Cross-Origin-Opener-Policy "same-origin"
    http-response set-header Content-Security-Policy-Report-Only "base-uri 'self'; default-src 'unsafe-inline' 'unsafe-eval' https://*.paypal.com https://*.spawndev.com http://localhost:* https://xi.spawndev.com:44365; report-uri https://zeta.spawndev.com:44365/api/SCPReport/Report;"

